name: Build & Push Lab Sidecar Image

on:
  push:
    branches:
      - main
    paths:
      - 'sidecar/Dockerfile'   # Only trigger when the sidecar image changes

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/deployit-lab-sidecar

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity authentication

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Authenticate to Google Cloud using the service account key stored as a secret
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      # Configure Docker to use gcloud credentials for gcr.io
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push sidecar image
        uses: docker/build-push-action@v5
        with:
          context: sidecar
          file: sidecar/Dockerfile
          push: true
          # Tag with both 'latest' and the commit SHA for rollback capability
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Sidecar image pushed to ${{ env.IMAGE }}:latest"
